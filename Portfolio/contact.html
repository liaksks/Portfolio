<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="portfolio.css" />
  </head>
  <body>
    <header>
      <div class="top-bar">
        <h1>LIAVERSE</h1>
        <h1>WELCOME TO MY PAGE</h1>
      </div>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="project.html">Project</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <section class="contact-section">
      <!-- FORM -->
      <div class="form-box">
        <input type="text" placeholder="Name" />
        <input type="email" placeholder="Email" />
        <textarea placeholder="Message/Feedback"></textarea>
        <button onclick="showMessage()">Send</button>
      </div>

      <!-- CONTACT INFO -->
      <div class="contact-info">
        <p>You may contact me through the following details.</p>
        <p>📧 mygmail@gmail.com</p>
        <p>📞 09123456789</p>
        <p>💬 messengerlink.com</p>
        <p>📘 facebooklink.com</p>
      </div>
    </section>

    <!-- POPUP -->
    <div id="popup" class="popup">
      <span class="close-btn" onclick="closePopup()">✖</span>
      <p>
        Your message is sent.<br />
        Thank you for visiting<br />
        my website
      </p>
    </div>

    <footer>
      <h2>LIAVERSE</h2>
    </footer>

    <script>
      function showMessage() {
        document.getElementById("popup").style.display = "block";

        setTimeout(() => {
          document.getElementById("popup").style.display = "none";
        }, 3000);
      }
    </script>
  </body>
</html>
