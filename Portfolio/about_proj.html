<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificates</title>

    <link rel="stylesheet" href="portfolio.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="cert-header">
      <a href="project.html" class="back-btn">← Back</a>
      <h1>Project Detailes</h1>
    </header>

    <!-- CERTIFICATE SECTION -->
    <section class="cert-container">
      <div class="cert-box">
        <img id="certImage" src="images/home.png" alt="home" />
      </div>

      <!-- NEXT BUTTON -->
      <button class="next-btn" onclick="nextSlide()">→</button>
      <button class="prev-btn" onclick="prevSlide()">←</button>
    </section>

    <!-- FOOTER -->
    <footer>
      <h2>LIAVERSE</h2>
    </footer>

    <!-- JAVASCRIPT -->
    <script>
      const images = [
        "images/home.png",
        "images/employees.png",
        "images/allowance.jpg.png",
        "images/salary.png",
        "images/deduction.png",
      ];

      let currentIndex = 0;

      /* NEXT */
      function nextSlide() {
        currentIndex++;

        if (currentIndex >= images.length) {
          currentIndex = 0;
        }

        document.getElementById("certImage").src = images[currentIndex];
      }

      /* PREVIOUS */
      function prevSlide() {
        currentIndex--;

        if (currentIndex < 0) {
          currentIndex = images.length - 1;
        }

        document.getElementById("certImage").src = images[currentIndex];
      }
    </script>
  </body>
</html>
